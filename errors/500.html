<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error 500 - Error interno del servidor</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-container {
            text-align: center;
            color: white;
        }
        h1 { font-size: 72px; margin-bottom: 0; }
        .error-code { font-size: 24px; opacity: 0.8; }
        p { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>500</h1>
        <div class="error-code">Error interno del servidor</div>
        <p>Lo sentimos, algo salió mal. Por favor, intente más tarde.</p>
    </div>
</body>
</html>
